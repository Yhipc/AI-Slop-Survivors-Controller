<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quin69 Command Deck</title>
<link rel="stylesheet" href="styles.css" />

<div class="stage">
  <div class="player">
    <iframe id="player" src="about:blank" allowfullscreen title="Twitch player"></iframe>

    <!-- Hotkey frame overlay, fitted across the bottom of the player -->
    <div class="overlay" id="overlay">
      <button id="deckToggle" class="deck-toggle" title="Hide / show hotkeys">▾</button>
      <div class="hud-controls">
        <span id="whoami" class="whoami" hidden></span>
        <button id="loginBtn" class="btn btn-primary">Log in with Twitch</button>
        <button id="logoutBtn" class="btn" hidden>Log out</button>
        <span id="status" class="status" role="status" aria-live="polite"></span>
      </div>
      <div class="hud" id="hud">
        <img id="hudFrame" class="hud-frame" alt="Command frame" />
        <div id="hotspots" class="hud-hotspots"><!-- injected by app.js --></div>
      </div>
    </div>
  </div>

  <div class="chat">
    <iframe id="chat" src="about:blank" title="Twitch chat"></iframe>
  </div>
</div>

<script src="app.js"></script>

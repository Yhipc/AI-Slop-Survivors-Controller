<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quin69 Command Deck</title>
<link rel="stylesheet" href="styles.css" />

<div class="stage">
  <img class="side side-left" src="leftborderQ69ASS.png" alt="" aria-hidden="true" />

  <div class="left">
    <iframe id="player" src="about:blank" allowfullscreen title="Twitch player"></iframe>

    <!-- Hotkey bar, docked flush at the bottom, centered -->
    <div class="hud" id="hud">
      <div class="hud-inner">
        <img id="hudFrame" class="hud-frame" alt="Command frame" />
        <div id="hotspots" class="hud-hotspots"><!-- injected by app.js --></div>
      </div>
    </div>
  </div>

  <div class="chat">
    <!-- Account + links + status, above the chat window -->
    <div class="chat-controls">
      <div class="cc-row">
        <span id="whoami" class="whoami" hidden></span>
        <button id="loginBtn" class="gbtn gbtn-primary">Log in with Twitch</button>
        <button id="logoutBtn" class="gbtn" hidden>Log out</button>
      </div>
      <div class="cc-row">
        <a class="gbtn" href="help.html">FAQ / Help</a>
        <a class="gbtn gbtn-donate" href="help.html#support">❤ Keep Server Alive</a>
      </div>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </div>
    <iframe id="chat" src="about:blank" title="Twitch chat"></iframe>
  </div>

  <img class="side side-right" src="rightboarderQ69ASS.png" alt="" aria-hidden="true" />
</div>

<script src="app.js"></script>

name = "q69-twitch-auth"
main = "src/worker.js"
compatibility_date = "2026-01-01"

# Public, non-secret config. Edit these two, then deploy.
[vars]
TWITCH_CLIENT_ID = "PASTE_YOUR_CLIENT_ID_HERE"
